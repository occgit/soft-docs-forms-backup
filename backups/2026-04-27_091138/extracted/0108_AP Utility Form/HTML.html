<!DOCTYPE html>
<html>
<head>
    <title>Etrieve Form</title>
    <link href="bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="theme.default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/6pac-slickgrid/2.4.34/slick-default-theme.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/6pac-slickgrid/2.4.34/slick.grid.min.css" />
    <link href="CSS.css" rel="stylesheet">
    
</head>
<body>
    <div class="page container-fluid">
        <div class="form-row">
            <div class="col-12 col-md-6 text-center text-lg-left">
                <img src="https://oaklandcc.edu/images/softdocs/thumbnail_horizontal.png" width="80%">
            </div>
            <div class="col-12 col-md-6 text-left mt-3">
                <h1 class="text-center text-md-right pt-1">AP Utility</h1>
            </div>
        </div>
        <hr style="background-color: #FFFFFF">
        
        <section>
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            Select a Table
                        </div>
                        <div class="card-body">
                            <div class="row no-gutters">
                                <div class="col-12 col-lg-4">
                                    <select class="form-control" data-bind="value: table, options: tables, optionsText: 'name', optionsCaption: 'Choose...'"></select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <section data-bind="visible: table" style="display: none;">
            <div class="row">
                <div class="col-12">
                    <div class="card mb-3">
                        <div class="card-header">
                    	    <h3>Current Table Data</h3>
                        </div>
                        <div class="card-body">
                            <div class="row" data-bind="visible: tabledata().length > 0 ">
                                <div class="col-12 col-lg-2">
                    	            <button type="button" class="btn btn-default btn-block" data-bind="click: function(){downloadData()}">Download</button>
                                </div>
                                <div class="col-12 col-lg-6">
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text">Search: </span>
                                        </div>
                                        <input id="search" class="form-control" placeholder="Plain strings - separate terms with a space." />
                                    </div>
                                </div>
                            </div>
                		    <div style="position:relative;">
                                <div style="width:100%;">
                                    <div id="rowCount" >
                                        <p>
                                            Displaying 
                                            <strong id="currentRowCount"></strong>
                                            rows of
                                            <strong id="totalRowCount"></strong>.
                                        </p>
                                    </div>
                                    <div id="myGrid" style="width:100%;height:400px;" data-bind="css: {loading: loading()}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 col-lg-6">
                    <div class="card mb-3">
                        <div class="card-header">
                            <h3>Upload New Mileage Data</h3>
                        </div>
                        <div class="card-body">
                            <p>This will clear the current table - take a back-up by clicking "download" first.</p>
                    	    <div class="row no-gutters ">
                    	        <button type="button" class="col-12 col-md-6 col-md-3 btn btn-info" data-bind="text: showColumnOrder() ? 'Hide Column Order' : 'View Column Order', click: function(){showColumnOrder(!showColumnOrder())}">View Column Order</button>
                    	    </div>
                    	    <div class="row no-gutters " data-bind="visible: showColumnOrder" style="display: none;">
                    	        <div class="col-12 col-md-9 col-md-6" id="codedColumns">
                    	            <div class="row no-gutters ">
                    		            <div class="col-12">
                    		                <strong>Uploaded file must include these columns in this order:</strong>
                    		            </div>
                    	            </div>
                    	            <dl class="dl-horizontal row" data-bind="foreach: table() ? table().data : []">
                    	                <dt class="col-12" data-bind="text: field"></dt>
                                        <!--<dd class="col-3" data-bind="text: name"></dd>-->
                    	            </dl>
                    	        </div>
                    	    </div>
                    	    
                    	    <div class="row no-gutters ">
                    	        <div class="col-12">
                    	            <!--<input type="file" id="fileUpload" />-->
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text" id="inputGroupFileAddon01">Upload</span>
                                        </div>
                                        <div class="custom-file">
                                            <input type="file" class="custom-file-input" id="fileUpload" name="fileUpload" aria-describedby="inputGroupFileAddon01">
                                            <label class="custom-file-label" for="fileUpload">Choose file</label>
                                        </div>
                                    </div>
                    	        </div>
                	        </div>
                    	    <div class="row no-gutters ">
                    	       <div class="col-12 form-inline">
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text">Number of header rows to skip</span>
                                        </div>
                                        <input type="number" id="headerRows" min="0" class="form-control" data-bind="value: headerRows"/>
                                    </div>
                    	        </div>
                	        </div>
                        </div>
                        <div class="card-footer">
                            <div class="row no-gutters">
                    	        <button class="col-12 col-md-6 btn btn-info" type="button" data-bind="click: upload">Upload</button>
                    	    </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-lg-6">
                    <div class="card mb-3">
                    <div class="card-header">
                        <h3>Add New Data</h3>
                    </div>
                    <div class="card-body">
                        <div data-bind="visible: !loading()" style="display: none;">
                    	    <div data-bind="visible: showAddRow">
                    	        <div data-bind="foreach: table() ? table().data : []">
                    	            <!--<div style="width:100px; margin-left:10px; float:left">-->
                    	            <!--    <label style="width:100%" data-bind="text: display, attr: {for: 'new' + column}"></label>-->
                    	            <!--    <input type="text" style="width: 100%" data-bind="value: newValue, attr: {id: 'new' + column}"/>-->
                    	            <!--</div>-->
                    	            
                                    <div class="row-no-gutters form-group">
                                        <div class="col-12 col-md-12">
                                            <div class="input-group">
                                                <span class="input-group-prepend">
                                                    <span class="input-group-text col-12" data-bind="text: name"></span>
                                                </span>
                                                <input class="form-control" data-bind="value: newValue, attr: { id: 'new' + field, type: $data.addType || 'text' }"/>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                    	    </div>
                        </div>
                    </div>
                    <div class="card-footer">
                	    <div class="row no-gutters">
                	        <div class="col-12 col-md-6 col-md-3">
                	            <button class="btn btn-primary btn-block" type="button" data-bind="text: showAddRow() ? 'Cancel' : 'Add New Data', css: {'btn-danger':  showAddRow()}, click: function(){showAddRow(!showAddRow())}">&nbsp;</button>
                	        </div>
                	        <div class="col-12 col-md-6 col-md-3">
                    	        <button type="button" class="btn btn-success btn-block" data-bind="click: addsinglerow, visible: showAddRow">Save New Data</button>
                	        </div>
                	    </div>
                    </div>
                </div>
                </div>
            </div>
        </section>
    </div>
    
</body>
</html>
