                        <label for="studentSearch">Student Search (Enter ID)</label>
                        <input id="studentSearch" name="studentSearch"

                        <input id="courseSection" name="courseSection" class="text-left  "
                        type="text" data-bind="autocomplete: { localSource: 'studentCourseReg',  validate: true,  labelMask: ['registrationSection'],  selectedMask: ['registrationSection'],  formFields: {'courseTitle':'registrationCourseTitle','semester':'registrationTerm','deadlineDate':'registrationDeadlineDate'} } "
                        />

                    <div class="text-left hidden ">

                        />
