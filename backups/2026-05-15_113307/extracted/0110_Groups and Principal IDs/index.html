<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    
    <head>
        <title>New Etrieve Form</title>
        <link rel="stylesheet" href="bootstrap.min.css"
        />
        <!-- <script src="jquery-2.2.0.min.js"></script>  <script src="JS.js"></script> -->
        <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css"
        />
        <style>
            .ui-datepicker{ position: relative; z-index: 10000 !important; }
        </style>
        <style>
            .page { margin: 10px auto; border: 1px solid #ddd; box-shadow: 0 0 30px grey; padding: 10px; background-color:white; }
        </style>
        <link rel="stylesheet" href="https://webapps.oaklandcc.edu/cdn/styles/main.css"
        />
        <link rel="stylesheet" href="https://webapps.oaklandcc.edu/cdn/icons/css/fontawesome.min.css"
        />
        <link rel="stylesheet" href="https://webapps.oaklandcc.edu/cdn/icons/css/solid.min.css"
        />
        <link rel="stylesheet" href="https://webapps.oaklandcc.edu/cdn/icons/css/regular.min.css"
        />
    </head>
    
    <body>
        <div class="page container">
            <div id="row28" class="text-left row fd-form-masthead ">
                <div id="col29" class="col-xs-12 col-sm-12 text-left revised-on "><span id="revisedOn30" name="revisedOn" class="col-sm-12 text-right  ">Revised 11/24</span>
                </div>
                <div id="col31" class="col-xs-12 col-sm-12 text-left logo ">
                    <img id="ele32" name="ele19" class="text-left  " width="80%" data-bind="attr:{src:&#10;'https://webapps.oaklandcc.edu/cdn/images/occ-horizontal-white1.png'}"
                    alt="Oakland Community College Logo" src="" />
                </div>
                <div id="col33" class="col-xs-12 col-sm-12 text-left  ">
                    <h1 id="ele34" name="ele21" class="text-left form-title ">Groups and Principal IDs</h1>
                </div>
                <div id="col35" class="col-xs-12 col-sm-12 text-left  ">
                    <hr id="ele36" name="ele26" class="text-left  " style=" border-color:#046a38;  border-width:3px; "
                    />
                </div>
            </div>
            <div id="groupRow" name="groupRow" class="text-left row " data-bind="dynamicList:true">
                <div id="quickInputsColumn13" name="quickInputsColumn1" class="col-xs-12 col-sm-6 text-left  ">
                    <div class="text-left  ">
                        <label for="groupName">Group Name</label>
                        <input id="groupName" name="groupName" class="text-left  "
                        type="text" />
                    </div>
                </div>
                <div id="quickInputsColumn15" name="quickInputsColumn2" class="col-xs-12 col-sm-6 text-left  ">
                    <div class="text-left  ">
                        <label for="principalID">Principal ID</label>
                        <input id="principalID" name="principalID" class="text-left  "
                        type="text" />
                    </div>
                </div>
            </div>
        </div>
    </body>

</html>
