<!DOCTYPE html>
<html xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
    <title>HTML Template</title>
    <script src="https://softdocscdn.etrieve.cloud/lib/bootstrap.4.bundle.js"></script>
    <link rel="stylesheet" href="https://softdocscdn.etrieve.cloud/styles/bootstrap.css" />
    <!--<link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css" />-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/timepicker/1.3.5/jquery.timepicker.min.css">
    <link rel="stylesheet" href="https://softdocscdn.etrieve.cloud/styles/softdocs-bootstrap.css" />
    <link rel="stylesheet" href="softdocs.css" />

<!--[if gte mso 9]><xml>
<mso:CustomDocumentProperties>
<mso:_dlc_DocId msdt:dt="string">FVDPX2ED2USH-59979594-55394</mso:_dlc_DocId>
<mso:_dlc_DocIdItemGuid msdt:dt="string">faf35960-b926-4f11-a484-5f807172c6ef</mso:_dlc_DocIdItemGuid>
<mso:_dlc_DocIdUrl msdt:dt="string">https://softdocs.sharepoint.com/ProfessionalServices/HigherEducation/_layouts/15/DocIdRedir.aspx?ID=FVDPX2ED2USH-59979594-55394, FVDPX2ED2USH-59979594-55394</mso:_dlc_DocIdUrl>
</mso:CustomDocumentProperties>
</xml><![endif]-->
</head>
<body>
    
    <main role="main" class="page container-fluid">
        <section>
            <!-- Header Section -->
            <div class="jumbotron">
                <div class="row">
                    <div class="col-md-6 text-center text-md-left">
                        <img class="header-image" src="Softdocs.png" />
                    </div>
                    <div class="col-md-6 mt-4 text-center text-md-right">
                        <h3 class="bold">
                            Clear User's Security External ID
                        </h3>
                    </div>
                </div>
            </div>
            <div class="d-none">
                <!-- Hidden inputs go here -->
                
            </div>
        </section>
        
        
        <!-- USER SEARCH SECTION -->
        <section>
            <div class="card mb-3">
                <div class="card-header bg-primary text-white">
                    <h4 class="card-title">
                        User Search
                    </h4>
                </div>
                <div class="card-body">
                    <div class="row form-group">
                        <div class="col-md-5 col-12">
                            <label for="userSecuritySearch">User's Name or Email Address</label>
                            <input id="userSecuritySearch" class="form-control" data-bind="autocomplete: { integrationSource: 'Security_Utility_Get_all_Users',  clearOnFocus: true,  validate: true,  labelMask: ['UserName', ' - ', 'Email'],  selectedMask: ['UserName'],  formFields: {'userSecurityEmail':'Email', 'userSecurityLogin':'UserLoginID', 'userSecuritySystemID':'UserID', 'userSecurityExternalID':'ExternalID'} } " />
                        </div>
                        <div class="col-md-3 col-5">
                            <label for="userSecurityEmail">Email</label>
                            <input id="userSecurityEmail" class="form-control" readonly />
                        </div>
                        <div class="col-md-3 col-5">
                            <label for="userSecurityLogin">Login Name</label>
                            <input id="userSecurityLogin" class="form-control" readonly />
                        </div>
                        <div class="col-md-1 col-2">
                            <label for="userSecuritySystemID">System ID</label>
                            <input id="userSecuritySystemID" class="form-control" readonly />
                        </div>
                    </div>
              </div>
            </div>
        </section>
        
        <!-- USER FOUND SECTION -->
        <section>
            <div class="card mb-3">
                <div class="card-header bg-info text-white">
                    <h4 class="card-title">
                        User Found
                    </h4>
                </div>
                <div class="card-body">
                    <div class="row form-group justify-content-sm-center">
                        <div class="col-lg-8">
                            <strong>User found. Confirm current External ID before proceeding.</strong>
                        </div>
                    </div>
                    <div class="row form-group justify-content-sm-center">
                        <div class="col-lg-4 col-sm-6">
                            <label for="userSecurityExternalID">External ID</label>
                            <input id="userSecurityExternalID" class="form-control" readonly />
                        </div>
                        <div class="col-lg-4 col-sm-6">
                            <button type="button" id="clearExternalIDBtn" class="btn btn-warning btn-block btn-lg" style="margin-top: 21px;">Clear User's External ID</button>
                        </div>
                    </div>
              </div>
            </div>
        </section>

    </main>
</body>
</html>
