<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    
    <head>
        <title>New Etrieve Form</title>
        <link rel="stylesheet" href="bootstrap.min.css"
        />
        <!-- <script src="jquery-2.2.0.min.js"></script>  <script src="JS.js"></script> -->
        <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css"
        />
        <style>
            .ui-datepicker{ position: relative; z-index: 10000 !important; }
        </style>
        <style>
            .page { margin: 10px auto; border: 1px solid #ddd; box-shadow: 0 0 30px grey; padding: 10px; background-color:white; }
        </style>
    </head>
    
    <body>
        <div class="page container">
            <div id="HeaderRow2" name="HeaderRow" class="text-left row " style="overflow: auto;  padding:4% 0% 4% 0%;  margin:0% 0% 0% 0%;  background-color:#ffffff;  color:#000000; ">
                <div id="col3" class="col-xs-12 col-sm-12 text-right  ">
                    <h5 id="ele4" name="ele37" class="text-right  "><i>Revised 04/26</i></h5>
                </div>
                <div id="HeaderLeft5" name="HeaderLeft" class="col-xs-12 col-sm-12 text-center  ">
                    <img id="HeaderLogo6" name="HeaderLogo" class="col-sm-12 text-center  "
                    src="https://oaklandcc.edu/images/softdocs/thumbnail_horizontal.png" width="80%"
                    alt="this is an alt tag for screen readers" />
                </div>
                <div id="HeaderRight7" name="HeaderRight" class="col-xs-12 col-sm-12 text-center  ">
                    <h2 id="h2_8" name="h2_27" class="text-center  "><b>Party Registration</b></h2>
                </div>
                <div id="col9" class="col-xs-12 col-sm-12 text-left  " style=" padding:0px 0px 0px 0px;  margin:-20px 0px 0px 0px; ">
                    <hr id="ele10" name="ele34" class="text-left  " style=" border-color:#046A38;  border-width:3px; "
                    />
                </div>
            </div>
            <div id="quickInputsRow24" name="quickInputsRow" class="text-left row ">
                <div id="quickInputsColumn25" name="quickInputsColumn1" class="col-xs-12 col-sm-8 text-left  ">
                    <div class="text-left  ">
                        <label for="userName">Name</label>
                        <input id="userName" name="userName" class="text-left  " required="required"
                        type="text" />
                    </div>
                </div>
                <div id="quickInputsColumn27" name="quickInputsColumn2" class="col-xs-12 col-sm-4 text-left  ">
                    <div class="text-left  ">
                        <label for="userId">ID</label>
                        <input id="userId" name="userId" class="text-left  " required="required"
                        type="text" />
                    </div>
                </div>
            </div>
            <div id="quickInputsRow30" name="quickInputsRow" class="text-left row ">
                <div id="quickInputsColumn31" name="quickInputsColumn1" class="col-xs-12 col-sm-12 text-left  ">
                    <div class="text-left  ">
                        <label for="userAddress">Address</label>
                        <input id="userAddress" name="userAddress" class="text-left  "
                        required="required" type="text" />
                    </div>
                </div>
            </div>
            <div id="quickInputsRow34" name="quickInputsRow" class="text-left row ">
                <div id="quickInputsColumn35" name="quickInputsColumn1" class="col-xs-12 col-sm-6 text-left  ">
                    <div class="text-left  ">
                        <label for="userCity">City</label>
                        <input id="userCity" name="userCity" class="text-left  " required="required"
                        type="text" />
                    </div>
                </div>
                <div id="quickInputsColumn37" name="quickInputsColumn2" class="col-xs-12 col-sm-3 text-left  ">
                    <div class="text-left  ">
                        <label for="userState">State</label>
                        <input id="userState" name="userState" class="text-left  "
                        required="required" type="text" />
                    </div>
                </div>
                <div id="col39" class="col-xs-12 col-sm-3 text-left  ">
                    <div class="text-left  ">
                        <label for="userZip">Zip Code</label>
                        <input id="userZip" name="userZip" class="text-left  "
                        required="required" />
                    </div>
                </div>
            </div>
            <div id="quickHeadingRow50" name="quickHeadingRow" class="text-left row ">
                <div id="quickHeadingColumn51" name="quickHeadingColumn" class="col-xs-12 col-sm-12 text-left  ">
                    <h2 id="quickHeadingLarge52" name="quickHeadingLarge" class="text-center  "><strong>Event Details</strong></h2>
                </div>
            </div>
            <div id="quickInputsRow105" name="quickInputsRow" class="text-left row ">
                <div id="quickInputsColumn106" name="quickInputsColumn1" class="col-xs-12 col-sm-4 text-left  ">
                    <div class="text-left  ">
                        <label for="partyDate">Party Date</label>
                        <input id="partyDate" name="partyDate" class="text-left  "
                        type="text" data-bind="datepicker" />
                    </div>
                </div>
                <div id="quickInputsColumn108" name="quickInputsColumn2" class="col-xs-12 col-sm-4 text-left  ">
                    <div class="text-left  ">
                        <label for="contactPhone">Contact Phone</label>
                        <input id="contactPhone" name="contactPhone" class="text-left  "
                        required="required" type="text" data-bind="mask: '(999) 999-9999' " />
                    </div>
                </div>
                <div id="quickInputsColumn110" name="quickInputsColumn3" class="col-xs-12 col-sm-4 text-left  ">
                    <div class="text-left  ">
                        <label for="numebrOfGuests">Number of Guests</label>
                        <input id="numebrOfGuests" name="numebrOfGuests"
                        class="text-left  " placeholder="No more than 100" type="text" data-bind="numeric: { type: 'int',  allowNegative: false,  max: 100 } "
                        />
                    </div>
                </div>
            </div>
            <div id="quickHeadingRow54" name="quickHeadingRow" class="text-left row ">
                <div id="quickHeadingColumn55" name="quickHeadingColumn" class="col-xs-12 col-sm-12 text-left  ">
                    <h4 id="quickHeadingSmall56" name="quickHeadingSmall" class="text-left  ">Choice of Meals</h4>
                </div>
            </div>
            <div id="radioRow58" name="radioRow" class="text-left row ">
                <div id="radioCol59" name="radioCol1" class="col-xs-12 col-sm-4 text-left  ">
                    <input id="choicePizza" name="choicePizza" class="text-left  " type="checkbox"
                    value="pizza" />
                    <label for="choicePizza">Pizza</label>
                </div>
                <div id="radioCol63" name="radioCol3" class="col-xs-12 col-sm-4 text-left  ">
                    <input id="choiceHotDog" name="choiceHotDog" class="text-left  " type="checkbox"
                    value="hotDog" />
                    <label for="choiceHotDog">Hot Dog</label>
                </div>
                <div id="radioCol61" name="radioCol2" class="col-xs-12 col-sm-4 text-left  ">
                    <input id="choiceChickenFingers" name="choiceChickenFingers" class="text-left  "
                    type="checkbox" value="chickenFingers" />
                    <label for="choiceChickenFingers">Chicken Fingers</label>
                </div>
            </div>
            <div id="quickDropdownRow66" name="quickDropdownRow" class="text-left row ">
                <div id="quickDropdownColumn67" name="quickDropdownColumn" class="col-xs-12 col-sm-4 text-left  ">
                    <label for="choiceIceCream">Choice of Ice Cream</label>
                    <select id="choiceIceCream" name="choiceIceCream"
                    class="text-left  ">
                        <option value=""></option>
                        <option value="Vanilla">Vanilla</option>
                        <option value="Chocolate">Chocolate</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div id="col115" name="col115" class="col-xs-12 col-sm-4 text-left  "
                data-bind="visible: ( ( choiceIceCream() == 'Other' ) ) ">
                    <div class="text-left  ">
                        <label for="otherIceCream">Other Ice Cream Choice</label>
                        <input id="otherIceCream" name="otherIceCream"
                        class="text-left  " type="text" data-bind="visible: ( ( choiceIceCream() == 'Other' ) ) "
                        />
                    </div>
                </div>
            </div>
            <div id="quickHeadingRow541010" name="quickHeadingRow" class="text-left row ">
                <div id="quickHeadingColumn5510" name="quickHeadingColumn" class="col-xs-12 col-sm-12 text-left  ">
                    <h4 id="quickHeadingSmall5610" name="quickHeadingSmall5610" class="text-left  ">Choice of Drink</h4>
                </div>
            </div>
            <div id="radioRow83" name="radioRow" class="text-left row ">
                <div id="radioCol84" name="radioCol1" class="col-xs-12 col-sm-3 text-left  ">
                    <input id="choiceJuice" name="drinkGroup" class="text-left  " type="radio"
                    value="juice" />
                    <label for="choiceJuice">Juice</label>
                </div>
                <div id="radioCol86" name="radioCol2" class="col-xs-12 col-sm-3 text-left  ">
                    <input id="choiceSoda" name="drinkGroup" class="text-left  " type="radio"
                    value="soda" />
                    <label for="choiceSoda">Soda</label>
                </div>
            </div>
            <div id="quickTextAreaRow89" name="quickTextAreaRow" class="text-left row ">
                <div id="quickTextAreaColumn90" name="quickTextAreaColumn" class="col-xs-12 col-sm-12 text-left  ">
                    <label for="specialRequests">Do you have any special requests?</label>
                    <textarea id="specialRequests"
                    name="specialRequests" class="text-left  " placeholder="Please limit to reasonable requests"></textarea>
                </div>
            </div>
            <div id="quickHeadingRow5410101212" name="quickHeadingRow" class="text-left row ">
                <div id="quickHeadingColumn551012" name="quickHeadingColumn" class="col-xs-12 col-sm-12 text-left  ">
                    <h4 id="quickHeadingSmall561012" name="quickHeadingSmall561012" class="text-left  ">The Birthday Package Includes:</h4>
                </div>
            </div>
            <div id="row96" class="text-left row ">
                <div id="quickListUnorderedColumn97" name="quickListUnorderedColumn" class="col-xs-12 col-sm-12 text-left  ">
                    <ul id="quickListUnorderedElement98" name="quickListUnorderedElement"
                    class="text-left  ">
                        <li>Decorations</li>
                        <li>Party Favors</li>
                        <li>Meal, Drink &amp; Dessert</li>
                    </ul>
                </div>
            </div>
            <div id="quickHeadingRow100" name="quickHeadingRow" class="text-left row ">
                <div id="quickHeadingColumn101" name="quickHeadingColumn" class="col-xs-12 col-sm-12 text-left  "><span id="quickHeadingMedium102" name="quickHeadingMedium" class="text-left  "><h3>Using Span for unordered list</h3>
<ul>
  <li><span class="highlight">Item 1:</span> Description</li>
                    <li><span class="highlight">Item 2:</span> Description</li>
                    </ul>
                    </span>
                </div>
            </div>
            <div id="quickHeadingRow5410101616" name="quickHeadingRow" class="text-left row ">
                <div id="quickHeadingColumn551016" name="quickHeadingColumn" class="col-xs-12 col-sm-12 text-left  ">
                    <h4 id="quickHeadingSmall561016" name="quickHeadingSmall561016" class="text-center  ">Office Use Only</h4>
                </div>
            </div>
            <div id="itemList" name="itemList" class="text-left row " data-bind="dynamicList: true, dynamicListProperties: { addButtonID: 'addRow',  removeButtonID: 'removeRow',  maxLength: 4 } ">
                <div id="quickInputsColumn120" name="quickInputsColumn1" class="col-xs-12 col-sm-4 text-left  ">
                    <div class="text-left  ">
                        <label for="additionalItem">Additional Item</label>
                        <input id="additionalItem" name="additionalItem"
                        class="text-left  " type="text" />
                    </div>
                </div>
                <div id="quickInputsColumn122" name="quickInputsColumn2" class="col-xs-12 col-sm-4 text-left  ">
                    <div class="text-left  ">
                        <label for="personEmail">Email</label>
                        <input id="personEmail" name="personEmail" class="text-left  "
                        type="text" />
                    </div>
                </div>
                <div id="quickInputsColumn124" name="quickInputsColumn3" class="col-xs-12 col-sm-3 text-left  ">
                    <div class="text-left  ">
                        <label for="itemCost">Cost</label>
                        <input id="itemCost" name="itemCost" class="text-left  " type="text"
                        data-bind="money" />
                    </div>
                </div>
                <div id="col135" class="col-xs-12 col-sm-1 text-left  ">
                    <button id="removeItem" name="removeItem" class="text-left  " style=""
                    undefined="" data-bind="dynamicListRemoveRow: true">X</button>
                </div>
                <div id="col134" class="col-xs-12 col-sm-12 text-left  "><span id="ele139" name="ele139" class="text-left  "><hr style="border: none; border-top: 2px dashed #000;" /></span>
                </div>
            </div>
            <div id="quickInputsRow127" name="quickInputsRow" class="text-left row ">
                <div id="quickInputsColumn128" name="quickInputsColumn1" class="col-xs-12 col-sm-3 text-left  ">
                    <button id="addRow" name="addRow" class="text-left  " style="" undefined="">Add Item</button>
                </div>
                <div id="quickInputsColumn130" name="quickInputsColumn2" class="col-xs-12 col-sm-3 text-left  ">
                    <button id="removeRow" name="removeRow" class="text-left  " style="" undefined="">Remove Item</button>
                </div>
                <div id="col143" class="col-xs-12 col-sm-3 text-left  "><span id="ele145" name="ele145" class="text-left  "><!-- Empty --></span>
                </div>
                <div id="col140" class="col-xs-12 col-sm-3 text-left  ">
                    <div class="text-left  ">
                        <label for="totalCost">Total Cost</label>
                        <input id="totalCost" name="totalCost" class="text-left  "
                        data-bind="calculate: 'itemList:itemCost', money " />
                    </div>
                </div>
            </div>
        </div>
    </body>

</html>
